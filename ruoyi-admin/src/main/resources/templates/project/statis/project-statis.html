<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('项目列表')" />
	<th:block th:include="include :: bootstrap-select-css" />
</head>
<body class="gray-bg">
<div class="container-div">
	<div class="row">
		<div class="col-sm-12 search-collapse">
			<form id="project-form">
				<div class="select-list">
					<ul>
						<li>
							<label>项目编号：</label><input type="text" name="projectCode"/>
						</li>
						<li>
							<label>项目名称：</label><input type="text" name="projectName"/>
						</li>
						<li class="select-selectpicker">
							<label>状态： </label>
							<select  name="status"  data-none-selected-text="请选择" >
								<option value="">所有</option>
								<option value="1">未提交</option>
								<option value="2">已提交</option>
								<option value="3">已完成</option>
							</select>
						<li class="select-time">
							<label>创建时间： </label>
							<input type="text" class="time-input" name="beginCreateTime" placeholder="开始时间"/>
							<span>-</span>
							<input type="text" class="time-input" name="endCreateTime" placeholder="结束时间"/>
						</li>
						<li>
							<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
							<a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
						</li>
					</ul>
				</div>
			</form>
		</div>

		<div class="btn-group-sm" id="toolbar" role="group">
			<a class="btn btn-success" onclick="$.operate.add()">
				<i class="fa fa-plus"></i> 新增
			</a>
			<a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()">
				<i class="fa fa-remove"></i> 删除
			</a>
			<a class="btn btn-warning" onclick="$.table.exportExcel()" >
				<i class="fa fa-download"></i> 导出
			</a>
		</div>

		<div class="col-sm-12 select-table table-striped">
			<table id="bootstrap-table"></table>
		</div>
	</div>
</div>

<th:block th:include="include :: footer" />
<th:block th:include="include :: bootstrap-select-js" />
<script th:inline="javascript">
	var prefix = ctx + "project/statis";
	var isCeo = [[${isCeo}]];

	$(function() {
		var options = {
			url: prefix + "/list",
			createUrl: prefix + "/add",
			removeUrl: prefix + "/remove",
			updateUrl: prefix + "/edit/{id}",
			exportUrl: prefix + "/export",
			detailUrl: prefix + "/project-statis-detail/{id}",
			modalName: "项目",
			columns: [{
				checkbox: true
			},
			{
				field: 'id',
				title: '主键',
				visible: false
			},
			{
				field: 'projectCode',
				title: '项目编号'
			},
			{
				field: 'projectName',
				title: '项目名称',
				 formatter:function (value, row, index){
					if (isCeo){
						return `<a href="javascript:;" onclick="projectDetail(`+row.id+`)">`+value+`</a>`;
					}else {
						return value;
					}
				 }
			},
			{
				field: 'projectDetail',
				title: '项目详情'
			},
			{
				field: 'projectRemark',
				title: '项目备注'

			},
			{
				field: 'createBy',
				title: '创建人'
			},
			{
				field: 'createTime',
				title: '创建时间'
			},
			{
				field: 'createPost',
				title: '创建人所属岗位'
			},
			{
				field: 'createDept',
				title: '创建人所属部门'
			},
			{
				field: 'status',
				title: '状态',
				align: 'center',
				formatter: function(value, row, index) {
					if(value == 1){
						return '<span class="badge badge-danger">未提交</span>';
					}else if(value == 2){
						return '<span class="badge badge-warning">已提交</span>';
					}else if (value == 3){
						return '<span class="badge badge-success">已完成</span>';
					}
				}
			},
			{
				title: '操作',
				align: 'center',
				formatter: function(value, row, index) {
					var actions = [];
					if (row.status ==1){
						actions.push('<a class="btn btn-success btn-xs" href="javascript:;" onclick="commit(\'' + row.id + '\')" title="提交"><i class="fa fa-check"></i>提交</a>&nbsp;');
						actions.push('<a class="btn btn-danger btn-xs" href="javascript:;" onclick="$.operate.remove(\'' + row.id + '\')" title="删除"><i class="fa fa-remove"></i>删除</a>&nbsp;');
						actions.push('<a class="btn btn-warning btn-xs" href="javascript:;" onclick="$.operate.edit(\'' + row.id + '\')" title="编辑"><i class="fa fa-edit"></i>编辑</a>');
					}else if (row.status ==2){
						actions.push('<a class="btn btn-info btn-xs" href="javascript:;" onclick="complete(\'' + row.id + '\')" title="完成"><i class="fa fa fa-check-square"></i>完成</a>');
					}
					return actions.join('');
				}
			}]
		};
		$.table.init(options);
	});

	function commit(id) {
		$.modal.confirm("确认要提交选中的项目吗?", function() {
			let object = new Object();
			object.id = id;
			object.status = 2;
			$.operate.save(prefix + "/commit", object);
		});
	}

	// 完成
	function complete(id) {
		$.modal.confirm("确认要完成选中的项目吗?", function() {
			let object = new Object();
			object.id = id;
			object.status = 3;
			$.operate.save(prefix + "/commit", object);
		});
	}

	// 项目详情页
	function projectDetail(id){
		debugger
		table.set();
		$.modal.openTab(table.options.modalName +"详情", $.operate.detailUrl(id));
	}
</script>
</body>
</html>
