<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
	<th:block th:include="include :: header('新增请款配置明细')" />
	<th:block th:include="include :: bootstrap-fileinput-css" />
</head>
<body class="">
	<div class="wrapper wrapper-content animated fadeInRight">
		<form class="form-horizontal m" id="config-detail-edit" th:object="${pleaseMoneyConfigSub}">
			<input name="id" type="hidden" th:field="*{id}" />
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">请款类型：</label>
				<div class="col-sm-6">
					<select class="form-control" name="pleaseMoneyType" th:with="type=${@dict.getType('please_money_type')}">
						<option value="">--请选择--</option>
						<option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}" th:field="*{pleaseMoneyType}"></option>
					</select>
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">请款比例：</label>
				<div class="col-sm-6">
					<input class="form-control" type="number" name="money" th:field="*{money}">
				</div>
			</div>
			<div class="form-group">
				<label class="col-sm-3 control-label is-required">排序：</label>
				<div class="col-sm-6">
					<input class="form-control" type="number" name="sort" th:field="*{sort}">
				</div>
			</div>
		</form>
	</div>

	<th:block th:include="include :: footer" />
	<th:block th:include="include :: bootstrap-fileinput-js" />
	<script type="text/javascript">
		var prefix = ctx + "please-money/config";

		$("#config-detail-edit").validate({
			rules:{
				pleaseMoneyType:{
					required:true
				},
				money:{
					required:true
				},
				sort:{
					required:true
				}
			},
		});

		function submitHandler() {
			if ($.validate.form()) {
				$.operate.save(prefix + "/config-detail-edit", $('#config-detail-edit').serialize(),function(result) {
					if (result.code == web_status.SUCCESS){
						top.$("iframe").each(function() {
							if (this.src.indexOf("config-detail") > -1) {
								this.contentWindow.initDetailTable();
								return false;
							}
						});
					}
				})
			}
	    }
	</script>
</body>
</html>
