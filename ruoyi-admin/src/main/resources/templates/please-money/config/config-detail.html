<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('请款配置详情')" />
    <style type="text/css">
        table label.error{position: inherit;}select + label.error{z-index:1;right:40px;}
    </style>
</head>
<body class="gray-bg">
<div class="main-content">
    <h4 class="form-header h4">请款主项</h4>
    <form class="form-horizontal m" id="config-detail" th:object="${pleaseMoneyConfig}">
        <input name="id" type="hidden" th:field="*{id}" />
        <div class="row">
            <div class="col-sm-6">
                <div class="form-group">
                    <label class="col-sm-4 control-label">请款名称：</label>
                    <div class="col-sm-6">
                        <input class="form-control" type="text" name="configName" th:field="*{configName}">
                    </div>
                </div>
            </div>
            <div class="col-sm-6">
                <div class="form-group">
                    <label class="col-sm-4 control-label">所属项目：</label>
                    <div class="col-sm-6">
                        <input class="form-control" type="text" name="sort" th:field="*{projectName}">
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-6">
                <div class="form-group">
                    <label class="col-sm-4 control-label">请款详情：</label>
                    <div class="col-sm-6">
                        <textarea name="projectDetail" maxlength="1000" class="form-control"
                                  rows="3" style="width: 930px" th:field="*{configDetail}"></textarea>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-6">
                <div class="form-group">
                    <label class="col-sm-4 control-label">创建人：</label>
                    <div class="col-sm-6">
                        <input class="form-control" type="text" name="createBy" th:field="*{createBy}">
                    </div>
                </div>
            </div>
            <div class="col-sm-6">
                <div class="form-group">
                    <label class="col-sm-4 control-label">创建时间：</label>
                    <div class="col-sm-6">
                        <input class="form-control" type="text" name="createTime"
                               th:value="${#dates.format(pleaseMoneyConfig.createTime, 'yyyy-MM-dd HH:mm:ss')}">
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-6">
                <div class="form-group">
                    <label class="col-sm-4 control-label">创建人所属岗位：</label>
                    <div class="col-sm-6">
                        <input class="form-control" type="text" name="createPost" th:field="*{createPost}">
                    </div>
                </div>
            </div>
            <div class="col-sm-6">
                <div class="form-group">
                    <label class="col-sm-4 control-label">创建人所属部门：</label>  <!-- 调整 label 宽度 -->
                    <div class="col-sm-6">
                        <input class="form-control" type="text" name="createDept" th:field="*{createDept}">
                    </div>
                </div>
            </div>
        </div>
    </form>
    <h4 class="form-header h4">请款子项</h4>
    <div class="row">
        <div class="col-sm-12">
            <a class="btn btn-success btn-sm" onclick="$.operate.add()">
                <i class="fa fa-plus"></i> 新增
            </a>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
</div>

<th:block th:include="include :: footer" />
<script th:src="@{/js/jquery.tmpl.js}"></script>
<script th:inline="javascript">
    var prefix = ctx + "please-money/config";
    $(function() {
        var options = {
            url: prefix + "/config-detail-list",
            createUrl: prefix + "/config-detail-add/[[${pleaseMoneyConfig.id}]]",
            updateUrl: prefix + "/config-detail-edit/{id}",
            removeUrl: prefix + "/config-detail-remove",
            sortName: 'sort',
            sortOrder: 'asc',
            method: 'post',
            earch: false,
            showSearch: false,
            showToggle: false,
            pagination: false,
            modalName: "请款子项",
            queryParams: function(params) {
                return {
                    mId: $("input[name='id']").val()
                };
            },
            columns: [{
                checkbox: true
            },
            {
                field: 'sort',
                title: '排序',
                align: 'center',
            },
            {
                field: 'pleaseMoneyType',
                title: "请款类型",
                align: 'center',
            },
            {
                field: 'money',
                title: "请款比例",
                align: 'center',
                formatter: function(value, row, index) {
                    if($.common.equals(0,value)){
                        null;
                    }else {
                        return '<span>' + value +'%'+'</span>';
                    }
                }
            },
            {
                field: 'createBy',
                title: '创建人',
                align: 'center',
            },
            {
                field: 'createTime',
                title: '创建时间',
                align: 'center',
            },
            {
                field: 'createPost',
                title: '创建人岗位',
                align: 'center',
            },
            {
                field: 'createDept',
                align: 'center',
                title: '创建人部门',
            },
            {
                field: 'status',
                title: '状态',
                align: 'center',
                formatter: function(value, row, index) {
                    if(value == 1){
                        return '<span class="badge badge-danger">未开始</span>';
                    }else if (value == 2){
                        return '<span class="badge badge-warning">进行中</span>';
                    }else if (value == 3){
                        return '<span class="badge badge-success">已完成</span>';
                    }
                }
            },
            {
                title: '操作',
                align: 'center',
                formatter: function(value, row, index) {
                    var actions = [];
                    actions.push('<a class="btn btn-warning btn-xs" href="javascript:;" onclick="$.operate.edit(\'' + row.id + '\')" title="编辑"><i class="fa fa-edit"></i>编辑</a>&nbsp;');
                    actions.push('<a class="btn btn-danger btn-xs" href="javascript:;" onclick="$.operate.remove(\'' + row.id + '\')" title="删除"><i class="fa fa-remove"></i>删除</a>');
                    return actions.join('');
                }
            }],
        };
        $.table.init(options);
    });

    function initDetailTable() {
        $('#bootstrap-table').bootstrapTable('refresh')
    }
</script>
</body>
</html>
