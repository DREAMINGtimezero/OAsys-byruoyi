<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
	<th:block th:include="include :: header('请款统计')" />
	<th:block th:include="include :: bootstrap-select-css" />
</head>
<body class="gray-bg">
<div class="container-div">
	<div class="row">
		<div class="col-sm-12 search-collapse">
			<form id="project-form">
				<div class="select-list">
					<ul>
						<li>
							<label>请款名称：</label><input type="text" name="configName"/>
						</li>
						<li class="select-selectpicker">
							<label>状态： </label>
							<select  name="status"  data-none-selected-text="请选择" >
								<option value="">所有</option>
								<option value="1">未提交</option>
								<option value="2">已提交</option>
							</select>
						<li class="select-time">
							<label>创建时间： </label>
							<input type="text" class="time-input" name="beginCreateTime" placeholder="开始时间"/>
							<span>-</span>
							<input type="text" class="time-input" name="endCreateTime" placeholder="结束时间"/>
						</li>
						<li>
							<a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
							<a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
						</li>
					</ul>
				</div>
			</form>
		</div>

		<div class="btn-group-sm" id="toolbar" role="group">
			<a class="btn btn-success" onclick="$.operate.add()">
				<i class="fa fa-plus"></i> 新增
			</a>
		</div>

		<div class="col-sm-12 select-table table-striped">
			<table id="bootstrap-table"></table>
		</div>
	</div>
</div>

<th:block th:include="include :: footer" />
<th:block th:include="include :: bootstrap-select-js" />
<script th:inline="javascript">
	var detailFlag = [[${@permission.hasPermi('monitor:operlog:detail')}]];
	var datas = [[${@dict.getType('sys_oper_type')}]];
	var prefix = ctx + "please-money/config";

	$(function() {
		var options = {
			url: prefix + "/config-list",
			createUrl: prefix + "/add",
			removeUrl: prefix + "/config-remove",
			updateUrl: prefix + "/edit/{id}",
			modalName: "请款",
			detailView: true,
			onExpandRow : function(index, row, $detail) {
				initChildTable(index, row, $detail);
			},
			columns: [
				{
					field: 'id',
					title: '主键',
					visible: false
				},
				{
					field: 'configName',
					align: 'center',
					title: '请款名称'
				},
				{
					field: 'configDetail',
					align: 'center',
					title: '请款详情'
				},
				{
					field: 'projectName',
					align: 'center',
					title: '所属项目'
				},
				{
					field: 'contractName',
					align: 'center',
					title: '关联合同'
				},
				{
					field: 'title',
					align: 'center',
					title: '关联技术附件'
				},
				{
					field: 'createBy',
					align: 'center',
					title: '创建人',
				},
				{
					field: 'createTime',
					align: 'center',
					title: '创建时间'
				},
				{
					field: 'createPost',
					align: 'center',
					title: '创建人所属岗位',
					visible: false
				},
				{
					field: 'createDept',
					align: 'center',
					title: '创建人所属部门',
					visible: false
				},
				{
					field: 'status',
					title: '状态',
					align: 'center',
					formatter: function(value, row, index) {
						if(value == 1){
							return '<span class="badge badge-danger">未提交</span>';
						}else if (value == 2){
							return '<span class="badge badge-warning">进行中</span>';
						}else if (value == 3){
							return '<span class="badge badge-success">已完成</span>';
						}
					}
				},
				{
					title: '操作',
					align: 'center',
					style:  { whiteSpace: 'nowrap' },
					formatter: function(value, row, index) {
						var actions = [];
						if (row.status == 1){
							actions.push('<a class="btn btn-success btn-xs" href="javascript:;" onclick="commit(\'' + row.id + '\')" title="提交"><i class="fa fa-check"></i>提交</a>&nbsp;');
							actions.push('<a class="btn btn-danger btn-xs" href="javascript:;" onclick="$.operate.remove(\'' + row.id + '\')" title="删除"><i class="fa fa-remove"></i>删除</a>&nbsp;');
							actions.push('<a class="btn btn-warning btn-xs" href="javascript:;" onclick="$.operate.edit(\'' + row.id + '\')" title="编辑"><i class="fa fa-edit"></i>编辑</a>&nbsp;');
						}else {
							actions.push('<a class="btn btn-primary btn-xs" href="javascript:;" onclick="config(\'' + row.id + '\')" title="设置"><i class="fa fa-cog"></i>设置</a>&nbsp;');
							actions.push('<a class="btn btn-info btn-xs" href="javascript:;" onclick="complete(\'' + row.id + '\')" title="完成"><i class="fa fa fa-check-square"></i>完成</a>');
						}
						return actions.join('');
					}
				}
			]
		};
		$.table.init(options);
	});

	function initChildTable(index, row, $detail) {
		var childTable = $detail.html('<table style="table-layout:fixed"></table>').find('table');
		var mStatus = row.status;
		$(childTable).bootstrapTable({
			url: prefix + "/config-detail-list",
			method: 'post',
			sidePagination: "server",
			contentType: "application/x-www-form-urlencoded",
			queryParams:{mId: row.id},
			sortName: 'sort',
			sortOrder: 'asc',
			columns: [
				{
					field: 'sort',
					align: 'center',
					title: '排序',
				},
				{
					field: 'pleaseMoneyType',
					align: 'center',
					title: "请款类型",
				},
				{
					field: 'money',
					align: 'center',
					title: "请款比例",
					formatter: function(value, row, index) {
						if($.common.equals(0,value)){
							null;
						}else {
							return '<span>' + value +'%'+'</span>';
						}
					}
				},
				{
					field: 'createBy',
					align: 'center',
					title: '创建人',
				},
				{
					field: 'createTime',
					align: 'center',
					title: '创建时间',
				},
				{
					field: 'createPost',
					align: 'center',
					title: '创建人岗位',
				},
				{
					field: 'createDept',
					align: 'center',
					title: '创建人部门',
				},
				{
					field: 'status',
					title: '状态',
					align: 'center',
					formatter: function(value, row, index) {
						if(value == 1){
							return '<span class="badge badge-danger">未开始</span>';
						}else if (value == 2){
							return '<span class="badge badge-warning">进行中</span>';
						}else if (value == 3){
							return '<span class="badge badge-success">已完成</span>';
						}
					}
				},
				{
					title: '操作',
					align: 'center',
					formatter: function(value, row, index) {
						var actions = [];
							actions.push('<a class="btn btn-primary btn-xs" href="javascript:;" onclick="handle(\'' + row.id + '\')" title="处理明细"><i class="fa fa-mail-forward"></i></a>&nbsp;');
						return actions.join('');
					}
				}
			]
		});
	};

	function commit(id) {
		$.modal.confirm("确认要提交选中的配置吗?", function() {
			let object = new Object();
			object.id = id;
			object.status = 2;
			$.operate.save(prefix + "/config-commit", object);
		});
	}

	// 设置请款的流程顺序
	function config(id) {
		table.set();
		$.modal.popupRight(table.options.modalName + "详情", prefix + "/config-detail/" + id);
	}

	// 处理页面
	function handle(id) {
		table.set();
		$.modal.popupRight("请款处理", prefix + "/config-sun-detail/" + id);
	}

	// 完成
	function complete(id) {
		$.modal.confirm("确认要完成选中的请款吗?", function() {
			let object = new Object();
			object.id = id;
			object.status = 3;
			$.operate.save(prefix + "/config-complete", object);
		});
	}
</script>
</body>
</html>
