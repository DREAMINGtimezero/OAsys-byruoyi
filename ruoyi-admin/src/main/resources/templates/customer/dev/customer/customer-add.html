<!DOCTYPE html>
<html lang="en">
<head>
    <th:block th:include="include :: header('新增客户')" />
    <th:block th:include="include :: bootstrap-fileinput-css" />

</head>
<body class="">
<div class="wrapper wrapper-content animated fadeInRight">
    <form class="form-horizontal m" id="form-customer-add" method="post">
        <div class="form-group">
            <label class="col-sm-3 control-label">客户名称：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="customerName" id="customerName">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label ">手机号：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="phone" id="phone" >
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label ">微信：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="wechat" id="wechat" >
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label ">邮箱：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="email" id="email" >
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label ">渠道：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="channel" id="channel" >
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">资方:</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="capital" id="capital" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">性质:</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="mode" id="mode" >
            </div>
        </div>
    </form>
</div>
</body>
<th:block th:include="include :: footer" />
<th:block th:include="include :: bootstrap-fileinput-js" />
<script type="text/javascript">
    var prefix = ctx + "customer/dev/customer";
    $.validator.addMethod("phoneCheck", function(value, element) {
        // 如果为空则跳过验证，否则校验手机号格式
        return this.optional(element) || /^1[3-9]\d{9}$/.test(value);
    }, "请输入正确的11位手机号");
    $("#form-customer-add").validate({
        focusCleanup: true,
        rules: {
            phone: {
                required: false,    // 非必填
                phoneCheck: true     // 只有填写了才校验格式
            },
            email: {
                required: false,    // 非必填
                email: true          // 只有填写了才校验邮箱格式
            }
        },
        messages: {
            phone: {
                phoneCheck: "请输入正确的11位手机号"
            },
            email: {
                email: "请输入正确的邮箱格式"
            }
        },
        errorElement: "span",
        errorClass: "help-block text-danger",
        highlight: function(element) {
            $(element).closest('.form-group').addClass('has-error');
        },
        unhighlight: function(element) {
            $(element).closest('.form-group').removeClass('has-error');
        },
        errorPlacement: function(error, element) {
            error.appendTo(element.closest('.col-sm-8'));
        }
        // 直接去掉 rules 里 projectCode 的配置
    });
    function submitHandler() {
        // 如果表单验证通过
        if ($.validate.form()) {

            // 定义一个 Ajax 请求配置对象
            var config = {
                url: prefix + "/add",      // 提交的接口地址，比如 "/cost-management/servicecontract/add"
                type: "post",              // 提交方式，POST 请求
                dataType: "json",          // 希望后台返回 JSON 格式
                data: $('#form-customer-add').serialize(), // 把 form 表单的数据序列化成 key=value&key=value 的形式
                success: function(result) { // 当请求成功时执行的回调
                    $.operate.successCallback(result); // 调用 RuoYi 封装的成功处理方法
                }
            };

            // 用 jQuery 的 Ajax 方法发送请求
            $.ajax(config);
        }
    }

</script>
</html>
