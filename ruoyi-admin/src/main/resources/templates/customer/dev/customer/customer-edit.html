<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>
    <th:block th:include="include :: header('修改客户信息')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-customer-edit" th:object="${customer}">
        <input name="id" type="hidden" th:field="*{id}" />
        <div class="form-group">
            <label class="col-sm-3 control-label">客户名称：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="customerName" th:field="*{customerName}" >
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">手机号：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="phone" th:field="*{phone}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label ">微信：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="wechat" th:field="*{wechat}" >
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label ">邮箱：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="email" th:field="*{email}" >
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label ">渠道：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="channel" th:field="*{channel}" >
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">资方类型：</label>
            <div class="col-sm-8">
                <select name="capitalType" class="form-control" th:field="*{capitalType}">
                    <option value="1">耐火材料</option>
                    <option value="2">钢铁企业</option>
                    <option value="3">设计院</option>
                    <option value="4">其他</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">资方:</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="capital" th:field="*{capital}" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label ">性质:</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="mode" th:field="*{mode}" >
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script type="text/javascript">
    var prefix = ctx + "customer/dev/customer";
    $.validator.addMethod("phoneCheck", function(value, element) {
        // 如果为空则跳过验证，否则校验手机号格式
        return this.optional(element) || /^1[3-9]\d{9}$/.test(value);
    }, "请输入正确的11位手机号");
    $("#form-customer-edit").validate({
        focusCleanup: true,
        rules: {
            capital:{
                required:true
            },
            phone: {
                required: false,    // 非必填
                phoneCheck: true     // 只有填写了才校验格式
            },
            email: {
                required: false,    // 非必填
                email: true          // 只有填写了才校验邮箱格式
            }

        },
        messages: {
            phone: {
                phoneCheck: "请输入正确的11位手机号"
            },
            email: {
                email: "请输入正确的邮箱格式"
            }
        },
        errorElement: "span",
        errorClass: "help-block text-danger",
        highlight: function(element) {
            $(element).closest('.form-group').addClass('has-error');
        },
        unhighlight: function(element) {
            $(element).closest('.form-group').removeClass('has-error');
        },
        errorPlacement: function(error, element) {
            error.appendTo(element.closest('.col-sm-8'));
        }

    });

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/edit", $('#form-customer-edit').serialize());
        }
    }

</script>
</body>
</html>
