<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:include="include :: header('企业沟通记录')"/>
</head>
<body class="dark-blue">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <div class="ibox-title">
                <h5><i class="fa fa-list"></i> 企业沟通记录</h5>
                <h3 th:text="${enterprise.enterpriseName}" style="display: inline-block; margin-left: 15px;"></h3>
            </div>
            <form id="searchForm">
                <input type="hidden" name="enterpriseId" th:value="${enterprise.id}"/>
            </form>
        </div>

        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="$.operate.add()">
                <i class="fa fa-plus"></i> 新增
            </a>
            <a class="btn btn-primary single disabled" onclick="$.operate.edit()">
                <i class="fa fa-edit"></i> 修改
            </a>
            <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()">
                <i class="fa fa-remove"></i> 删除
            </a>
            <a class="btn btn-warning" onclick="$.table.exportExcel()">
                <i class="fa fa-download"></i> 导出
            </a>
        </div>

        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>
<th:block th:include="include :: footer"/>
<script th:inline="javascript">
    var prefix = ctx + "customer/dev/enterprise-sub";
    var enterpriseId = [[${enterprise.id}]];
    $(function () {
        var options = {
            url: prefix + "/list?enterpriseId=" + enterpriseId,
            createUrl: prefix + "/add?enterpriseId=" + enterpriseId,
            updateUrl: prefix + "/edit/{id}",
            removeUrl: prefix + "/remove",
            exportUrl: prefix + "/export",
            modalName: "企业沟通记录",
            columns: [{
                checkbox: true
            },
                {
                    field: 'id',
                    title: '主键',
                    visible: false
                },
                {
                    field: 'wayOfVision',
                    title: '访问方式',
                    align: 'center'
                },
                {
                    field: 'progress',
                    title: '进展情况',
                    align: 'center'
                },
                {
                    field: 'communicationTime',
                    title: '沟通时间',
                    align: 'center',
                    formatter: function (value, row, index) {
                        return $.table.dateFormat(value);
                    }
                },
                {
                    field: 'note',
                    title: '备注信息',
                    align: 'center'
                },
                {
                    field: 'createBy',
                    title: '创建人',
                    align: 'center'
                },
                {
                    field: 'createTime',
                    title: '创建时间',
                    align: 'center',
                    formatter: function (value, row, index) {
                        return $.table.dateFormat(value);
                    }
                }
            ]
        };
        $.table.init(options);
    });
</script>
</body>
</html>
