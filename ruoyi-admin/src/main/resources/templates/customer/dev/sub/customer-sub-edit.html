<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改客户子')" />
    <th:block th:include="include :: datetimepicker-css" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-sub-edit" th:object="${customerSub}">
        <input name="id" th:field="*{id}" type="hidden">
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">选项：电话、线下拜访、微信沟通、其他：</label>
                <div class="col-sm-8">
                    <select name="wayOfVision" th:field="*{wayOfVision}" class="form-control" type="text" required>
                        <option value="PHONE">电话</option>
                        <option value="OFFLINE">线下拜访</option>
                        <option value="WECHAT">微信沟通</option>
                        <option value="OTHER">其它</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">进展情况：</label>
                <div class="col-sm-8">
                    <textarea name="progress" class="form-control" required>[[*{progress}]]</textarea>
                </div>
            </div>
        </div>
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">沟通时间：</label>
                <div class="col-sm-8">
                    <div class="input-group date">
                        <input name="communicationTime" th:value="${#dates.format(customerSub.communicationTime, 'yyyy-MM-dd')}" class="form-control" placeholder="yyyy-MM-dd" type="text" required>
                        <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label">备注信息：</label>
                <div class="col-sm-8">
                    <textarea name="note" class="form-control">[[*{note}]]</textarea>
                </div>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<th:block th:include="include :: datetimepicker-js" />
<script th:inline="javascript">
    var prefix = ctx + "customer/dev/sub";
    $("#form-sub-edit").validate({
        focusCleanup: true
    });

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/edit", $('#form-sub-edit').serialize(), submitCallback);
        }
    }

    $("input[name='communicationTime']").datetimepicker({
        format: "yyyy-mm-dd",
        minView: "month",
        autoclose: true
    });
    function submitCallback(result) {
        if (result.code === web_status.SUCCESS){
            top.$("iframe").each(function() {
                console.log(this.src);
                if (this.src.indexOf("detail") > -1) {
                    this.contentWindow.initDetailTable();
                    return false;
                }
            });
        }else {
            $.modal.msgWarning(result.msg);
        }
    }
</script>
</body>
</html>
