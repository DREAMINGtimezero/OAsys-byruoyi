<!DOCTYPE html>
<html lang="en" xmlns:shiro="http://www.w3.org/1999/xhtml">
<head>
    <th:block th:include="include :: header('企业数据导入')"/>
    <th:block th:include="include :: bootstrap-fileinput-css"/>
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-import" enctype="multipart/form-data">
        <div class="form-group">
            <label class="col-sm-3 control-label">选择文件：</label>
            <div class="col-sm-8">
                <input type="file" name="file" id="file" class="file form-control">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">文件格式：</label>
            <div class="col-sm-8">
                <span class="help-block m-b-none">
                    <font color="green">提示：</font> 
                    仅支持.xlsx格式文件导入，文件大小不超过10MB。
                    <a href="javascript:void(0);" onclick="$.table.importTemplate()" class="btn-link">下载导入模板</a>
                </span>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">重复处理：</label>
            <div class="col-sm-8">
                <div class="radio">
                    <label>
                        <input type="radio" name="updateSupport" value="0" checked> 跳过重复数据
                    </label>
                    <label style="margin-left: 20px">
                        <input type="radio" name="updateSupport" value="1"> 覆盖重复数据
                    </label>
                </div>
            </div>
        </div>
    </form>
</div>
</body>
<th:block th:include="include :: footer"/>
<th:block th:include="include :: bootstrap-fileinput-js"/>
<script type="text/javascript">
    var prefix = ctx + "customer/dev/enterprise";

    $(function() {
        // 初始化文件上传组件
        $('#file').fileinput({
            language: 'zh',
            allowedFileExtensions: ['xlsx'],
            maxFileSize: 10240,
            showUpload: false,
            showRemove: false,
            browseClass: "btn btn-primary btn-sm",
            browseLabel: "选择文件",
            browseIcon: "<i class="fa fa-file-excel-o"></i> ",
            layoutTemplates: {
                actionUpload: ''
            }
        });
    });

    function submitHandler() {
        var file = $('#file').val();
        if (!file) {
            $.modal.msgWarning("请选择需要导入的文件");
            return false;
        }
        var formData = new FormData($('#form-import')[0]);
        $.ajax({
            url: prefix + "/importData",
            type: "post",
            data: formData,
            contentType: false,
            processData: false,
            success: function(result) {
                if (result.code == 0) {
                    $.modal.msgSuccess(result.msg);
                    $.modal.close();
                    $.table.refresh();
                } else {
                    $.modal.msgError(result.msg);
                }
            }
        });
    }

    // 下载导入模板
    $.table.importTemplate = function() {
        window.location.href = prefix + "/importTemplate";
    };
</script>
</html>
