<!DOCTYPE html>
<html lang="en">
<head>
    <th:block th:include="include :: header('新增企业')"/>
    <th:block th:include="include :: bootstrap-fileinput-css"/>
</head>
<body class="">
<div class="wrapper wrapper-content animated fadeInRight">
    <form class="form-horizontal m" id="form-enterprise-add" method="post">
        <div class="form-group">
            <label class="col-sm-3 control-label">企业名称：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="enterpriseName" id="enterpriseName">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">地区：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="region" id="region">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">成立时间：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="establishmentDate" id="establishmentDate">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">注册资本：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="registeredCapital" id="registeredCapital">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">实缴资本：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="paidInCapital" id="paidInCapital">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">人数：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="employeeCount" id="employeeCount">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">产品：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="product" id="product">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">网站地址：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="website" id="website">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">联系电话：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="contactPhone" id="contactPhone">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">来源：</label>
            <div class="col-sm-8">
                <select class="form-control" name="dataSource" id="dataSource">
                    <option value="1">公司网页</option>
                    <option value="2">系统新增</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">状态：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="status" id="status">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">详情：</label>
            <div class="col-sm-8">
                <textarea class="form-control" name="detail" id="detail"></textarea>
            </div>
        </div>
    </form>
</div>
</body>
<th:block th:include="include :: footer"/>
<th:block th:include="include :: bootstrap-fileinput-js"/>
<script type="text/javascript">
    var prefix = ctx + "customer/dev/enterprise";

    $.validator.addMethod("phoneCheck", function(value, element) {
        return this.optional(element) || /^1[3-9]\d{9}$/.test(value);
    }, "请输入正确的11位手机号");

    $("#form-enterprise-add").validate({
        focusCleanup: true,
        rules: {
            contactPhone: {
                required: false,
                phoneCheck: true
            }
        },
        messages: {
            contactPhone: {
                phoneCheck: "请输入正确的11位手机号"
            }
        },
        errorElement: "span",
        errorClass: "help-block text-danger",
        highlight: function(element) {
            $(element).closest('.form-group').addClass('has-error');
        },
        unhighlight: function(element) {
            $(element).closest('.form-group').removeClass('has-error');
        },
        errorPlacement: function(error, element) {
            error.appendTo(element.closest('.col-sm-8'));
        }
    });

    function submitHandler() {
        if ($.validate.form()) {
            var config = {
                url: prefix + "/add",
                type: "post",
                dataType: "json",
                data: $('#form-enterprise-add').serialize(),
                success: function(result) {
                    $.operate.successCallback(result);
                }
            };
            $.ajax(config);
        }
    }
</script>
</html>
