<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改技术协议')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal" id="form-agreement-edit" th:object="${technicalAgreement}">
        <input name="id" th:field="*{id}" type="hidden">
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">所属项目：</label>
                <div class="col-sm-8">
                    <select class="form-control" name="projectCode" required>
                    </select>
                </div>
            </div>
        </div>
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">技术协议编号：</label>
                <div class="col-sm-8">
                    <input name="technicalAgreementCode" th:field="*{technicalAgreementCode}" class="form-control" type="text" required>
                </div>
            </div>
        </div>
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">技术协议文件名称：</label>
                <div class="col-sm-8">
                    <input name="title" th:field="*{title}" class="form-control" type="text" required>
                </div>
            </div>
        </div>
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">描述信息：</label>
                <div class="col-sm-8">
                    <textarea name="description" class="form-control" required>[[*{description}]]</textarea>
                </div>
            </div>
        </div>
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label">备注信息：</label>
                <div class="col-sm-8">
                    <input name="note" th:field="*{note}" class="form-control" type="text">
                </div>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var prefix = ctx + "contract/technical-agreement";
    $("#form-agreement-edit").validate({
        focusCleanup: true,
        rules: {
            projectCode: {
                required: true
            }
        },
        messages: {
            projectCode: {
                required: "请选择所属项目"
            }
        }
    });

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/edit", $('#form-agreement-edit').serialize());
        }
    }

    let projectCode = [[${technicalAgreement.projectCode}]];
    $(function() {
        initProjectCode();
    });

    // 初始化项目下拉框
    function initProjectCode(){
        $.ajax({
            url: ctx + "project/statis/list",
            type: "post",
            dataType: "json",
            data: {
                "status": 2,
                "pageNum": 1,
                "pageSize": 1000
            },
            success: function(result) {
                if (result.code === web_status.SUCCESS) {
                    let selector = $("select[name='projectCode']");
                    selector.empty();
                    let options = [];
                    let data = result.rows;
                    for (let i = 0; i < data.length; i++) {
                        console.log(projectCode);
                        console.log(data[i].projectCode);
                        if($.common.equals(projectCode,data[i].projectCode))
                        {
                            options.unshift("<option selected value='" + data[i].projectCode + "'>" + data[i].projectName + "</option>");
                            continue;
                        }
                        options.push("<option value='" + data[i].projectCode + "'>" + data[i].projectName + "</option>");
                    }
                    selector.append(options.join(""));
                }

            }
        })
    }
</script>
</body>
</html>
