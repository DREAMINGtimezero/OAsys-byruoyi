<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改合同')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-contract-edit" th:object="${contract}">
        <input name="id" type="hidden" th:field="*{id}" />
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">合同编号：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="contractId" th:field="*{contractId}" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">合同名称：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="contractName" th:field="*{contractName}" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">合同描述：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="description" th:field="*{description}" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">所属项目：</label>
            <div class="col-sm-8">
                <select class="form-control" name="projectCode" required>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="note" th:field="*{note}">
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script type="text/javascript">
    var prefix = ctx + "contract/contract";

    $("#form-contract-edit").validate({
        rules:{
            contractName:{
                required:true
            },
            description:{
                required:true
            },
            projectCode:{
                required:true
            }
        },
        focusCleanup: true
    });

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/edit", $('#form-contract-edit').serialize());
        }
    }
    let projectCode = '[[${contract.projectCode}]]';
    $(function() {
        initProjectCode();
    });

    // 初始化项目下拉框
    function initProjectCode(){
        $.ajax({
            url: ctx + "project/statis/list",
            type: "post",
            dataType: "json",
            data: {
                "status": 2,
                "pageNum": 1,
                "pageSize": 1000
            },
            success: function(result) {
                if (result.code === web_status.SUCCESS) {
                    let selector = $("select[name='projectCode']");
                    let options = [];
                    let data = result.rows;
                    for (let i = 0; i < data.length; i++) {
                        console.log(projectCode);
                        console.log(data[i].projectCode);
                        if($.common.equals(projectCode,data[i].projectCode))
                        {
                            options.unshift("<option selected value='" + data[i].projectCode + "'>" + data[i].projectName + "</option>");
                            continue;
                        }
                        options.push("<option value='" + data[i].projectCode + "'>" + data[i].projectName + "</option>");
                    }
                    selector.append(options.join(""));
                }

            }
        })
    }
</script>
</body>
</html>
