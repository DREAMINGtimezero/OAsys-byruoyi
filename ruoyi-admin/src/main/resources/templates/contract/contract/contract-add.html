<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('新增合同')" />
    <th:block th:include="include :: bootstrap-fileinput-css" />
</head>
<body class="">
<div class="wrapper wrapper-content animated fadeInRight">
    <form class="form-horizontal m" id="form-user-add" method="post">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">合同编号：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="contractId" id="contractId" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">合同名称：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="contractName" id="contractName" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">合同描述：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="description" id="description" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">所属项目：</label>
            <div class="col-sm-8">
                <select class="form-control" name="projectCode">
                    <option value="">请选择</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="note" id="note">
            </div>
        </div>
    </form>
</div>

<th:block th:include="include :: footer" />
<th:block th:include="include :: bootstrap-fileinput-js" />
<script type="text/javascript">
    var prefix = ctx + "contract/contract";

    $("#form-user-add").validate({
        focusCleanup: true,
        rules: {
            projectCode: {
                required: true
            }
        },
        messages: {
            projectCode: {
                required: "请选择所属项目"
            }
        }
    });

    function submitHandler() {
        if ($.validate.form()) {
            var config = {
                url: prefix + "/add",
                type: "post",
                dataType: "json",
                data: $('#form-user-add').serialize(),
                success: function(result) {
                    $.operate.successCallback(result);
                }
            };
            $.ajax(config);
        }
    }

    $(function() {//调用的方法在页面加载完成后立即执行
        initProjectCode();
    });

    // 初始化项目下拉框
    function initProjectCode(){
        $.ajax({
            url: ctx + "project/statis/list",
            type: "post",
            dataType: "json",
            data: {
                "status": 2,
                "pageNum": 1,
                "pageSize": 1000
            },
            success: function(result) {
                debugger;
                if (result.code == web_status.SUCCESS) {
                    var data = result.rows;
                    for (var i = 0; i < data.length; i++) {
                        $("select[name='projectCode']").append(
                            "<option value='" + data[i].projectCode + "'>" + data[i].projectName + "</option>"
                        );
                    }
                }
            }
        })
    }
</script>
</body>
</html>
