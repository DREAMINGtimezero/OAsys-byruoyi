<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('员工转正申请主列表')" />
</head>
<body class="gray-bg">
<div class="container-div">
    <div class="row">
        <div class="col-sm-12 search-collapse">
            <form id="formId">
                <div class="select-list">
                    <ul>
                        <li>
                            <label>入职日期：</label>
                            <input type="text" class="time-input" placeholder="请选择入职日期" name="serviceDate"/>
                        </li>
                        <li>
                            <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                            <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                        </li>
                    </ul>
                </div>
            </form>
        </div>

        <div class="btn-group-sm" id="toolbar" role="group">
            <a class="btn btn-success" onclick="$.operate.add()">
                <i class="fa fa-plus"></i> 添加
            </a>
            <a class="btn btn-primary"  th:href="@{/file/applyFormal.xlsx}">
                <i class="fa fa-download"></i> 模板下载
            </a>
        </div>

        <div class="col-sm-12 select-table table-striped">
            <table id="bootstrap-table"></table>
        </div>
    </div>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var prefix = ctx + "staff-service/apply-formal";
    var userName = [[${userName}]];

    $(function() {
        var options = {
            url: prefix + "/list",
            createUrl: prefix + "/add",
            updateUrl: prefix + "/edit/{id}",
            removeUrl: prefix + "/remove",
            modalName: "员工转正申请主",
            detailView: true,
            onExpandRow : function(index, row, $detail) {
                initChildTable(index, row, $detail);
            },
            columns: [
                {
                    field: 'id',
                    align: 'center',
                    title: '主键',
                    visible: false
                },
                {
                    field: 'createBy',
                    align: 'center',
                    title: '申请人',
                },
                {
                    field: 'workDate',
                    align: 'center',
                    title: '首次工作日期'
                },
                {
                    field: 'serviceDate',
                    align: 'center',
                    title: '入职日期'
                },
                {
                    field: 'servicePost',
                    align: 'center',
                    title: '试用期岗位'
                },
                {
                    field: 'workSummary',
                    align: 'center',
                    title: '工作总结',
                    formatter: function(value, row, index) {
                        var actions = [];
                        if(!value=='') {
                            actions.push('<a href="javascript:void(0)" onclick="summarize(\'' + row.id + '\')"><i class="fa fa-search"></i>点击查看</a>');
                        }else {
                            return '--';
                        }
                        return actions.join('');
                    }
                },
                {
                    field: 'suggestion',
                    align: 'center',
                    title: '给公司的建议',
                    formatter: function(value, row, index) {
                        var actions = [];
                        if(!value==''){
                            actions.push('<a href="javascript:void(0)" onclick="opinion(\'' + row.id + '\')"><i class="fa fa-search"></i>点击查看</a>');
                        }else {
                            return '--';
                        }
                        return actions.join('');
                    }
                },
                {
                    field: 'createTime',
                    align: 'center',
                    title: '申请时间'
                },
                {
                    field: 'status',
                    align: 'center',
                    title: '状态 ',
                    formatter: function(value, row, index) {
                        if (value == 1) {
                            return '<span class="badge badge-danger">未提交</span>';
                        } else if (value == 2) {
                            return '<span class="badge badge-warning">审核中</span>';
                        } else if (value == 3) {
                            return '<span class="badge badge-success">已完成</span>';
                        }
                    }
                },
                {
                    title: '操作',
                    align: 'center',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        if (row.status == 1){
                            actions.push('<a class="btn btn-success btn-xs" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                            actions.push('<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a> ');
                            actions.push('<a class="btn btn-info btn-xs" href="javascript:void(0)" onclick="detail(\''+ row.id + '\')" title="详情"><i class="fa fa-file-text-o"></i>详情</a>');
                        }else{
                            actions.push('<a class="btn btn-info btn-xs" onclick="detail(\''+ row.id + '\')" title="详情"><i class="fa fa-file-text-o"></i>详情</a>');
                        }
                        return actions.join('');
                    }
                }]
        };
        $.table.init(options);
    });

    initChildTable = function(index, row, $detail) {
        var childTable = $detail.html('<table style="table-layout:fixed"></table>').find('table');
        $(childTable).bootstrapTable({
            url: prefix + "/select-sub-byApplyId",
            method: 'post',
            sidePagination: "server",
            contentType: "application/x-www-form-urlencoded",
            queryParams: function(params) {    // 添加查询参数
                var queryParams = {
                    applyFormalId: row.id // 传递主表ID
                };
                return queryParams;
            },
            columns: [
                {
                    field : 'createBy',
                    align: 'center',
                    title : '申请人'
                },
                {
                    field : 'createTime',
                    align: 'center',
                    title : '申请时间'
                },
                {
                    field : 'initiateNote',
                    align: 'center',
                    title : '发起意见',
                    formatter: function(value, row, index) {
                        if ($.common.equals(userName,row.createBy)){
                            return '-';
                        }else {
                            return value;
                        }
                    }
                },
                {
                    field : 'initiateTime',
                    align: 'center',
                    title : '发起时间'
                },
                {
                    field : 'handleBy',
                    align: 'center',
                    title : '指定处理人'
                },
                {
                    field : 'handlePost',
                    align: 'center',
                    title : '处理人岗位'
                },
                {
                    field : 'handleDept',
                    align: 'center',
                    title : '处理人部门'
                },
                {
                    field : 'handleNote',
                    align: 'center',
                    title : '处理意见',
                    formatter: function(value, row, index) {
                        if ($.common.equals(userName,row.createBy)){
                            return '-';
                        }else {
                            return value;
                        }
                    }
                },
                {
                    field : 'handleTime',
                    align: 'center',
                    title : '处理时间'
                },
                {
                    field : 'note',
                    align: 'center',
                    title : '备注',
                    formatter: function(value, row, index) {
                        if ($.common.equals(userName,row.createBy)){
                            return '-';
                        }else {
                            return value;
                        }
                    }
                },
                {
                    field: 'status',
                    title: '处理状态',
                    align: 'center',
                    formatter: function(value, row, index) {
                        if ($.common.equals(userName,row.createBy)){
                            return '-';
                        }else {
                            if (value == 1) {
                                return '<span class="badge badge-danger">未提交</span>';//绿色 badge-primary
                            } else if (value == 2) {
                                return '<span class="badge badge-warning">待处理</span>';//黄色 badge-warning
                            } else if (value == 3) {
                                return '<span class="badge badge-primary">已处理</span>';//蓝色 badge-success
                            } else if (value == 4) {
                                return '<span class="badge badge-default">已驳回</span>';//红色 badge-danger
                            }
                            return '<span class="badge badge-default">未知</span>'; //灰色 badge-default
                        }
                    }
                },
            ]
        });
    };

    //详情跳转
    function detail(id) {
        table.set();
        $.modal.popupRight('查看转正申请详情', prefix + '/detail/' + id);
    }

    //查看工作总结跳转
    function summarize(id) {
        //var prefix = ctx + "staff-service/apply-formal";
        var url = prefix + '/summarize/' + id; // 拼接处理流程的URL
        $.modal.open("查看工作总结", url);
    }

    //查看给公司的建议跳转
    function opinion(id) {
        var url = prefix + '/opinion/' + id; // 拼接处理流程的URL
        $.modal.open("查看给公司的建议", url);
    }
</script>
</body>
</html>
