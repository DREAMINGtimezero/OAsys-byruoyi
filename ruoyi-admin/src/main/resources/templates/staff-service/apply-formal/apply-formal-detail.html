<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('转正申请详情')" />
    <th:block th:include="include :: datetimepicker-css" />
    <style type="text/css">
        table label.error{position: inherit;}select + label.error{z-index:1;right:40px;}
    </style>
</head>
<body class="gray-bg">
<div class="main-content">
    <form id="form-add" class="form-horizontal">
        <h4 class="form-header h4">转正申请信息</h4>
        <form class="form-horizontal m" id="applyFormal-detail" th:object="${applyFormal}">
            <input name="id" type="hidden" th:field="*{id}" />
            <div class="row">  <!-- 新增 row 包裹两列 -->
                <!-- 第一列：描述 -->
                <div class="col-sm-6">  <!-- 改为 col-sm-6 使两列平分宽度 -->
                    <div class="form-group">
                        <label class="col-sm-4 control-label">首次工作日期：</label>  <!-- 调整 label 宽度 -->
                        <div class="col-sm-8">
                            <input class="form-control" type="text" name="workDate"
                                   th:value="${#dates.format(applyFormal.workDate, 'yyyy-MM-dd')}" readonly>
                            <!--<input class="form-control" type="text" name="workDate" th:field="*{workDate}" readonly>-->
                        </div>
                    </div>
                </div>
                <!-- 第二列：差旅详情 -->
                <div class="col-sm-6">  <!-- 改为 col-sm-6 使两列平分宽度 -->
                    <div class="form-group">
                        <label class="col-sm-4 control-label">入职日期：</label>  <!-- 调整 label 宽度 -->
                        <div class="col-sm-8">
                            <input class="form-control" type="text" name="serviceDate"
                                   th:value="${#dates.format(applyFormal.serviceDate, 'yyyy-MM-dd')}" readonly>
                            <!--<input class="form-control" type="text" name="serviceDate" th:field="*{serviceDate}" readonly>-->
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">  <!-- 新增 row 包裹两列 -->
                <div class="col-sm-6">  <!-- 改为 col-sm-6 使两列平分宽度 -->
                    <div class="form-group">
                        <label class="col-sm-4 control-label">试用期岗位：</label>  <!-- 调整 label 宽度 -->
                        <div class="col-sm-8">
                            <input class="form-control" type="text" name="servicePost" th:field="*{servicePost}" readonly>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">  <!-- 改为 col-sm-6 使两列平分宽度 -->
                    <div class="form-group">
                        <label class="col-sm-4 control-label">申请人：</label>  <!-- 调整 label 宽度 -->
                        <div class="col-sm-8">
                            <input class="form-control" type="text" name="createBy" th:field="*{createBy}" readonly>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">  <!-- 改为 col-sm-6 使两列平分宽度 -->
                    <div class="form-group">
                        <label class="col-sm-4 control-label">申请时间：</label>  <!-- 调整 label 宽度 -->
                        <div class="col-sm-8">
                            <input class="form-control" type="text" name="createTime"
                                   th:value="${#dates.format(applyFormal.createTime, 'yyyy-MM-dd HH:mm:ss')}" readonly>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-12">  <!-- 改为 col-sm-6 使两列平分宽度 -->
                    <div class="form-group">
                        <label class="col-sm-2 control-label">工作总结：</label>  <!-- 调整 label 宽度 -->
                        <div class="col-sm-10">
                            <textarea class="form-control" name="workSummary" th:field="*{workSummary}"  readonly rows="3"></textarea>
                        </div>
                    </div>
                </div>
            </div>
            <!-- 宽度 = 原来 col-sm-6 的两倍，高度不变 -->
            <div class="row">
                <div class="col-sm-12">
                    <div class="form-group">
                        <label class="col-sm-2 control-label">给公司的建议：</label>
                        <div class="col-sm-10">
                            <textarea class="form-control" name="suggestion" th:field="*{suggestion}" readonly rows="3"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </form>

        <h4 class="form-header h4">申请转正处理流程</h4>
        <div class="row">
            <div class="col-sm-12">
                <div th:if="${applyFormal.status != 3}">
                    <button type="button" class="btn btn-white btn-sm" onclick="addChildRow()">
                        <i class="fa fa-plus"> 新增流程</i>
                    </button>
                    <button type="button" class="btn btn-white btn-sm" onclick="handleFinish()">
                        <i class="fa fa-minus"> 结束流程</i>
                    </button>
                </div>
                <div class="col-sm-12 select-table table-striped">
                    <table id="bootstrap-table"></table>
                </div>
            </div>
        </div>
    </form>
</div>
<div class="row">
    <div class="col-sm-offset-5 col-sm-10">
        <button type="button" class="btn btn-sm btn-danger" onclick="closeCurrentPage()"><i class="fa fa-reply-all"></i>关 闭 </button>
    </div>
</div>
<th:block th:include="include :: footer" />
<th:block th:include="include :: datetimepicker-js" />
<script th:src="@{/js/jquery.tmpl.js}"></script>
<script th:inline="javascript">
    $(function() {
        var prefix = ctx + "staff-service/apply-formal";
        var userName = [[${userName}]];
        var options = {
            url: prefix + "/select-sub-byApplyId",  // 使用后端接口获取数据
            method: 'post',
            earch: false,                 // 禁用搜索框
            showSearch: false,             // 禁用搜索按钮
            showToggle: false,            // 禁用切换视图（列表/卡片）按钮
            queryParams: function(params) {
                debugger
                return {
                    applyFormalId: [[${applyFormal.id}]]  // 传递ID
                };
            },
            pagination: true,  // 启用分页
            columns: [{
                checkbox: true
            },
                {
                    field: 'createBy',
                    align: 'center',
                    title: "申请人",
                },
                {
                    field: 'initiateNote',
                    align: 'center',
                    title: '发起人意见',
                    formatter: function(value, row, index) {
                        if ($.common.equals(userName,row.createBy)){
                            return '-';
                        }else {
                            return value;
                        }
                    }
                },
                {
                    field: 'initiateTime',
                    align: 'center',
                    title: '发起时间',
                },
                {
                    field: 'handleBy',
                    align: 'center',
                    title: '指定处理人',
                },
                {
                    field: 'handleDept',
                    align: 'center',
                    title: '处理人部门',
                },
                {
                    field: 'handlePost',
                    align: 'center',
                    title: '处理人岗位',
                },
                {
                    field: 'handleNote',
                    align: 'center',
                    title: '处理意见',
                    formatter: function(value, row, index) {
                        if ($.common.equals(userName,row.createBy)){
                            return '-';
                        }else {
                            return value;
                        }
                    }
                },
                {
                    field: 'handleTime',
                    align: 'center',
                    title: '处理时间',
                },
                {
                    field: 'status',
                    align: 'center',
                    title: '状态',
                    formatter: function(value, row, index) {
                        if ($.common.equals(userName,row.createBy)){
                            return '-';
                        }else {
                            if (value == 1) {
                                return '<span class="badge badge-danger">未提交</span>';//绿色 badge-primary
                            } else if (value == 2) {
                                return '<span class="badge badge-warning">待处理</span>';//黄色 badge-warning
                            } else if (value == 3) {
                                return '<span class="badge badge-primary">已完成</span>';//蓝色 badge-success
                            } else if (value == 4) {
                                return '<span class="badge badge-default">已驳回</span>';//红色 badge-danger
                            }
                            return '<span class="badge badge-default">未知</span>'; //灰色 badge-default
                        }
                    }
                },
                {
                    title: '文件',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        // 检查是否有文件数据，使用 row.fileNames 字段
                        if ($.common.isNotEmpty(row.fileNames) && row.fileNames.trim() !== '') {
                            actions.push('<a class="btn btn-file" onclick="$.table.fileView(\'' + row.fileNames + '\')" title="文件预览"><i class="fa fa-folder-open"></i>预览</a> ');
                            actions.push('<a class="btn btn-file" onclick="$.table.fileDownload(\'' + row.fileNames + '\')" title="文件下载"><i class="fa fa-download"></i>下载</a>');
                        } else {
                            actions.push('<span class="text-muted">无文件</span>');
                        }
                        return actions.join('');
                    }
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        if (row.status == 1) { // 未提交状态    || row.status == 4
                            actions.push('<a class="btn btn-primary btn-xs" onclick="jumpSubmit(\'' + row.id + '\')" title="发起"><i class="fa fa-paper-plane">发起</i></a>&nbsp;');
                        } else if (row.status == 2) { // 待处理状态
                            actions.push('<a class="btn btn-success btn-xs" onclick="jumpHandle(\'' + row.id + '\')" title="处理"><i class="fa fa-check">处理</i></a>&nbsp;');
                        }
                        return actions.join(''); // 返回按钮HTML字符串
                    }
                },
            ],
        };
        $.table.init(options);
    });

    //新增功能
    function addChildRow() {
        var prefix = ctx + "staff-service/apply-formal";
        var applyFormalId = [[${applyFormal.id}]];  // 获取主键ID
        // 添加确认对话框
        $.modal.confirm("确认新增吗?", function() {
            // 准备新增数据
            var data = {
                applyFormalId: applyFormalId,
                status: 1,  // 初始状态：未提交
                createBy: "",  // 后端会自动填充当前用户
            };
            $.ajax({
                url: prefix + "/apply-formal-sub-add",
                type: "POST",
                contentType: "application/json",
                data: JSON.stringify(data),
                success: function(result) {
                    if (result.code == web_status.SUCCESS) {
                        $.modal.msgSuccess("新增成功");
                        $.table.refresh();  // 刷新表格数据
                    } else {
                        $.modal.msgError(result.msg);
                    }
                }
            });
        });
    }

    /* 关闭当前页 */
    function closeCurrentPage() {
        debugger;
        var index = parent.layer.getFrameIndex(window.name);
        parent.layer.close(index); // 关闭当前页
    }

    //结束功能
    function handleFinish() {
        var applyFormalId = [[${applyFormal.id}]];  // 从Thymeleaf模板获取合同ID
        $.modal.confirm("确认要结束吗?", function() {
            var data = {
                "id": applyFormalId,  // 主键
                "status": 3       // 状态改为3-已结束
            };
            var prefix = ctx + "staff-service/apply-formal";
            $.ajax({
                url: prefix + "/applyFormalSub-end",
                type: "POST",
                data: data,
                success: function(result) {
                    if (result.code == web_status.SUCCESS) {
                        $.modal.msgSuccess("操作成功");
                        closeCurrentPage();// 关闭当前页面
                        window.parent.location.reload();
                    } else {
                        $.modal.msgError(result.msg);
                    }
                }
            });
        });
    }

    /* 文件下载 */
    function handleDownload(fileNames) {
        window.location.href = ctx + "common/batchDownload?fileName=" + encodeURI(fileNames);
    }

    //跳转提交页面
    function jumpSubmit(id) {
        var prefix = ctx + "staff-service/apply-formal";
        var url = prefix + '/jump-submit/' + id; // 拼接发起流程的URL
        $.modal.open("确认提交", url);
    }

    //跳转处理页面
    function jumpHandle(id) {
        var prefix = ctx + "staff-service/apply-formal";
        var url = prefix + '/jump-handle/' + id; // 拼接处理流程的URL
        $.modal.open("确认处理结果", url);
    }

    //提交处理后自动刷新
    function initDetailTable() {
        $('#bootstrap-table').bootstrapTable('refresh')
    }
</script>
</body>
</html>
