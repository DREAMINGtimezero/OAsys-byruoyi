<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
  <th:block th:include="include :: header('新增发送邮件')" />
  <th:block th:include="include :: bootstrap-fileinput-css" />
  <style>
    .checkbox-wrapper{
      display: flex;          /* 横铺 */
      flex-wrap: wrap;        /* 多余换行 */
      gap: 1rem 1.5rem;       /* 上下、左右间距 */
    }
    .checkbox-item{
      margin: 0;              /* 去掉 bootstrap 默认 margin */
    }
  </style>
</head>
<body class="">
<div class="wrapper wrapper-content animated fadeInRight">
  <form class="form-horizontal m" id="email-add">
    <div class="form-group">
      <label class="col-sm-3 control-label is-required">邮件主题：</label>
      <div class="col-sm-8">
        <input class="form-control" type="text" name="emailSubject" id="emailSubject" required>
      </div>
    </div>
    <div class="form-group">
      <label class="col-sm-3 control-label is-required">邮件内容：</label>
      <div class="col-sm-8">
        <textarea class="form-control" type="text" name="emailDetail" id="emailDetail" required></textarea>
      </div>
    </div>
    <div class="form-group">
      <label class="col-sm-3 control-label is-required">接收人：</label>
      <div class="col-sm-8">
        <div id="emailByCheckboxList" class="checkbox-wrapper">
          <!-- 复选框会由 JS 动态插到这里 -->
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="col-sm-3 control-label ">备注：</label>
      <div class="col-sm-8">
        <textarea class="form-control" type="text" name="note" id="note" ></textarea>
      </div>
    </div>

    <!--<input type="hidden" name="fileNames">
    <div class="row">
      <div class="col-sm-12">
        <div class="ibox float-e-margins">
          <div class="ibox-content">
            <div class="form-group">
              <label class="font-noraml">文件上传</label>
              <div class="file-loading">
                <input id="multipleFile" name="files" type="file" multiple>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>-->
  </form>
</div>



<th:block th:include="include :: footer" />
<th:block th:include="include :: bootstrap-fileinput-js" />
<script type="text/javascript">

  var prefix = ctx + "staff-service/email";

  $("#email-add").validate({
    onkeyup: false,
    rules:{
      userPhone:{
        isPhone:true
      },
      userEmail:{
        email:true
      },
    },
    focusCleanup: true
  });

  $(document).ready(function () {
    // 多图上传
    $("#multipleFile").fileinput({
      uploadUrl: ctx + 'common/uploads',
      uploadAsync: false
    }).on('filebatchuploadsuccess', function (event, data, previewId, index) {
      debugger;
      var rsp = data.response;
      $("input[name='fileNames']").val(rsp.fileNames.replaceAll("/profile/upload",""));
    }).on('fileremoved', function (event, id, index) {
      $("input[name='" + event.currentTarget.id + "']").val('')
    })

  });

  //添加发送邮件
  function submitHandler() {
    if ($.validate.form()) {
      $.operate.save(prefix + "/email-add", $('#email-add').serialize());
    }
  }

  //!* 页面加载完就拉数据 *!/  //接收人下拉框
  $(function() {
    initEmailBy();
  });
  //接收人下拉框
  function initEmailBy() {
    $.ajax({
      url: prefix + '/get-user',
      type: 'get',
      dataType: 'json',
      success: function (res) {
        if (res.code !== web_status.SUCCESS) {
          $.modal.msgWarning(res.msg);
          return;
        }
        let html = '';
        res.data.forEach(u => {
          html += `
          <div class="form-check checkbox-item">
            <input class="form-check-input" type="checkbox"
                   name="emailBy" value="${u.loginName}" id="cb_${u.userId}">
            <label class="form-check-label" for="cb_${u.userId}">
              ${u.userName}
            </label>
          </div>`;
        });
        $('#emailByCheckboxList').html(html);
      }
    });
  }
</script>
</body>
</html>
