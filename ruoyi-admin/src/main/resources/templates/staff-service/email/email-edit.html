<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('发送邮件-修改')" />
    <th:block th:include="include :: datetimepicker-css" />
    <style>
        .checkbox-wrapper{
            display: flex;          /* 横铺 */
            flex-wrap: wrap;        /* 多余换行 */
            gap: 1rem 1.5rem;       /* 上下、左右间距 */
        }
        .checkbox-item{
            margin: 0;              /* 去掉 bootstrap 默认 margin */
        }
    </style>
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="email-edit" th:object="${email}">
        <input name="id" th:field="*{id}" type="hidden">
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">邮件主题：</label>
                <div class="col-sm-8">
                    <input name="emailSubject" th:field="*{emailSubject}" class="form-control" type="text" required>
                </div>
            </div>
        </div>
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">邮件内容：</label>
                <div class="col-sm-8">
                    <textarea name="emailDetail" th:field="*{emailDetail}" class="form-control" type="text" required></textarea>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">接收人：</label>
            <div class="col-sm-8">
                <div id="emailByCheckboxList" class="checkbox-wrapper">
                    <!-- 复选框会由 JS 动态插到这里 -->
                </div>
            </div>
        </div>
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label">备注：</label>
                <div class="col-sm-8">
                    <textarea name="note" th:field="*{note}" class="form-control" type="text"></textarea>
                </div>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<th:block th:include="include :: datetimepicker-js" />
<script th:inline="javascript">

    var prefix = ctx + "staff-service/email";

    $("#email-edit").validate({
        focusCleanup: true
    });

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/email-edit", $('#email-edit').serialize());
        }
    }


    //!* 页面加载完就拉数据 *!/  //接收人下拉框
    $(function() {
        initEmailBy();
    });
    //接收人下拉框
    function initEmailBy() {
        $.ajax({
            url: prefix + '/get-user',
            type: 'get',
            dataType: 'json',
            success: function (res) {
                if (res.code !== web_status.SUCCESS) {
                    $.modal.msgWarning(res.msg);
                    return;
                }
                let html = '';
                res.data.forEach(u => {
                    html += `
          <div class="form-check checkbox-item">
            <input class="form-check-input" type="checkbox"
                   name="emailBy" value="${u.loginName}" id="cb_${u.userId}">
            <label class="form-check-label" for="cb_${u.userId}">
              ${u.userName}
            </label>
          </div>`;
                });
                $('#emailByCheckboxList').html(html);
            }
        });
    }
</script>
</body>
</html>
