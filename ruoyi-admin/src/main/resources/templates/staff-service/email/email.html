<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
  <th:block th:include="include :: header('发送邮件主页面')"/>
  <th:block th:include="include :: bootstrap-select-css"/>
</head>
<body class="gray-bg">
<div class="container-div">
  <div class="row">
    <div class="col-sm-12 search-collapse">
      <form id="mail-form">
        <div class="select-list">
          <ul>
            <li>
              <label>邮件主题：</label><input type="text" name="emailSubject"/>
            </li>
            <li>
              <label>邮件内容：</label><input type="text" name="emailDetail"/>
            </li>
            <li class="select-selectpicker">
              <label>状态： </label>
              <select  name="status"  data-none-selected-text="请选择" >
                <option value="">所有</option>
                <option value="1">未发送</option>
                <option value="2">已发送</option>
              </select>
            </li>
            <li class="select-time">
              <label>创建时间： </label>
              <input type="text" class="time-input" name="beginCreateTime" placeholder="开始时间"/>
              <span>-</span>
              <input type="text" class="time-input" name="endCreateTime" placeholder="结束时间"/>
            </li>
            <li>
              <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i
                      class="fa fa-search"></i>&nbsp;搜索</a>
              <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i
                      class="fa fa-refresh"></i>&nbsp;重置</a>
            </li>
          </ul>
        </div>
      </form>
    </div>

    <div class="btn-group-sm" id="toolbar" role="group">
      <a class="btn btn-success" onclick="$.operate.add()">
        <i class="fa fa-plus"></i> 新增
      </a>
    </div>

    <div class="col-sm-12 select-table table-striped">
      <table id="bootstrap-table"></table>
    </div>

  </div>
</div>



<th:block th:include="include :: footer"/>
<th:block th:include="include :: bootstrap-select-js"/>
<script th:inline="javascript">
  var detailFlag = [[${@permission.hasPermi('monitor:operlog:detail')}]];
  var datas = [[${@dict.getType('sys_oper_type')}]];
  var prefix = ctx + "staff-service/email";

  var userName = [[${userName}]];

  $(function () {
    var options = {
      url: prefix + "/list",
      createUrl: prefix + "/add",
      removeUrl: prefix + "/remove",
      updateUrl: prefix + "/edit/{id}",
      exportUrl: prefix + "/export",
      sortName: "createTime",
      sortOrder: "desc",
      modalName: "发送邮件",
      columns: [
        {
          field: 'id',
          title: '主键',
          align: 'center',
          visible: false
        },
        {
          field: 'emailSubject',
          align: 'center',
          title: '邮件主题'
        },
        {
          field: 'emailDetail',
          align: 'center',
          title: '邮件内容',
          formatter: function(value, row, index) {
            var actions = [];
            if(!value=='') {
              actions.push('<a href="javascript:void(0)" onclick="emailDetail(\'' + row.id + '\')"><i class="fa fa-search"></i>点击查看</a>');
            }else {
              return '--';
            }
            return actions.join('');
          }
        },
        {
          field: 'createBy',
          align: 'center',
          title: '发送人'
        },
        {
          field: 'createDept',
          align: 'center',
          title: '发送人部门'
        },
        {
          field: 'createPost',
          align: 'center',
          title: '发送人岗位'
        },
        {
          field: 'createTime',
          align: 'center',
          title: '创建时间'
        },
        {
          field: 'emailBy',
          align: 'center',
          title: '接收人'
        },
        {
          field: 'emailTime',
          align: 'center',
          title: '邮件发送时间'
        },
        {
          field: 'note',
          align: 'center',
          title: '备注'
        },
        /*
        {
          title: '附件文件',
          align: 'center',
          formatter: function(value, row, index) {
            var actions = [];
            // 检查是否有文件数据，使用 row.fileNames 字段
            if ($.common.isNotEmpty(row.fileNames) && row.fileNames.trim() !== '') {
              actions.push('<a class="btn btn-file" onclick="$.table.fileView(\'' + row.fileNames + '\')" title="文件预览"><i class="fa fa-folder-open"></i>预览</a> ');
              actions.push('<a class="btn btn-file" onclick="$.table.fileDownload(\'' + row.fileNames + '\')" title="文件下载"><i class="fa fa-download"></i>下载</a>');
            } else {
              actions.push('<span class="text-muted">无文件</span>');
            }
            return actions.join('');
          }
        },
        */
        {
          field: 'status',
          align: 'center',
          title: '状态',
          formatter: function(value, row, index) {
            if(value == 1){
              return '<span class="badge badge-danger">未发送</span>';
            }else if(value == 2){
              return '<span class="badge badge-primary">已发送</span>';
            }
          }
        },
        {
          title: '操作',
          align: 'center',
          formatter: function (value, row, index) {
            var actions = [];
            if (row.status == 1){
              actions.push('<a class="btn btn-primary btn-xs" href="javascript:void(0)" onclick="sending(\'' + row.id + '\')"><i class="fa fa-paper-plane"></i>发送</a> ');
              actions.push('<a class="btn btn-success btn-xs" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
              actions.push('<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a> ');
              return actions.join('');
            }else {
              return '-';
            }
          }
        }]
    };
    $.table.init(options);
  });

  /* 文件下载 */
  function handleDownload(fileNames) {
    window.location.href = ctx + "common/batchDownload?fileName=" + encodeURI(fileNames);
  }

  //查看邮件内容跳转
  function emailDetail(id) {
    var url = prefix + '/emailDetail/' + id; // 拼接处理流程的URL
    $.modal.open("查看邮件内容", url);
  }


  // 发送按钮功能（带“发送中”动画）
  function sending(id) {
    $.modal.confirm('确认要发送吗？', function () {
      $.modal.loading('正在发送中...');
      $.ajax({
        url: prefix + `/send/${id}`,
        type: 'PUT',
        success: function (result) {
          $.modal.closeLoading();
          if (result.code === web_status.SUCCESS) {
            $.modal.msgSuccess(result.msg || '发送成功');
            $.table.refresh();
          } else {
            $.modal.msgError(result.msg || '发送失败');
          }
        },
        error: function (xhr) {
          $.modal.closeLoading();
          $.modal.msgError('发送失败：' + (xhr.responseJSON?.msg || xhr.statusText));
        }
      });
    });
  }
</script>
</body>
</html>
