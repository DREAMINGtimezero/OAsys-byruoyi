<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('新增软件')" />
    <th:block th:include="include :: bootstrap-fileinput-css" />
</head>
<body class="">
<div class="wrapper wrapper-content animated fadeInRight">
    <form class="form-horizontal m" id="form-user-add">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">软件编号：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="softwareCode" id="softwareCode" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">软件名称：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="softwareName" id="softwareName" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">软件描述：</label>
            <div class="col-sm-8">
                <textarea class="form-control" type="text" name="description" id="description" required></textarea>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">金额：</label>
            <div class="col-sm-8">
                <input class="form-control" type="number" name="money" id="money" step="0.01" min="0" placeholder="请输入金额" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">费用类型：</label>
            <div class="col-sm-8">
                <select name="costType" id="costType" class="form-control" required>
                    <option value="">请选择</option>
                    <option value="1">费控内</option>
                    <option value="2">费控外</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">所属项目：</label>
            <div class="col-sm-8">
                <select class="form-control" name="projectCode">
                    <option value="">请选择</option>
                </select>
            </div>
        </div>
    </form>
</div>

<th:block th:include="include :: footer" />
<th:block th:include="include :: bootstrap-fileinput-js" />
<script type="text/javascript">
    var prefix = ctx + "purchase/software";
    $.validator.addMethod("maxDecimalLength", function(value, element, param) {
        // 允许为空，required 会处理
        if (!value) return true;

        // 移除非数字字符（允许小数点）
        let numStr = value.toString().replace(/[^0-9.]/g, '');

        // 分割整数和小数部分
        let parts = numStr.split('.');
        let integerPart = parts[0];
        let decimalPart = parts.length > 1 ? parts[1] : '';

        // 总位数 = 整数位数 + 小数位数
        let totalDigits = integerPart.length + decimalPart.length;

        return totalDigits <= param;
    }, "数字总位数超过");
    $("#form-user-add").validate({
        onkeyup: false,
        rules:{
            money: {
                required: true,
                number: true,
                min: 0,
                maxDecimalLength: 13 // 调用自定义规则，限制总位数为13位
            },
            projectCode: {
                required: true
            }
        },
        messages: {
            money: {
                required: "请输入金额",
                number: "请输入有效的金额",
                min: "金额不能为负数",
                maxDecimalLength: "数字总位数不能超过13位（不含小数点）"
            },
            projectCode: {
                required: "请选择所属项目"
            }
        },
        focusCleanup: true
    });

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/add", $('#form-user-add').serialize());
        }
    }

    $(function() {//调用的方法在页面加载完成后立即执行
        initProjectCode();
    });

    // 初始化项目下拉框
    function initProjectCode(){
        $.ajax({
            url: ctx + "project/statis/list",
            type: "post",
            dataType: "json",
            data: {
                "status": 2,
                "pageNum": 1,
                "pageSize": 1000
            },
            success: function(result) {
                if (result.code == web_status.SUCCESS) {
                    var data = result.rows;
                    for (var i = 0; i < data.length; i++) {
                        $("select[name='projectCode']").append(
                            "<option value='" + data[i].projectCode + "'>" + data[i].projectName + "</option>");}
                }
            }
        })
    }
</script>
</body>
</html>
