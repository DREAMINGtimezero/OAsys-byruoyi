<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改软件')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-software-edit" th:object="${software}">
        <input name="id" type="hidden" th:field="*{id}" />
        <div class="form-group">
            <label class="col-sm-3 control-label">软件编号：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="softwareCode" th:field="*{softwareCode}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">软件名称：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="softwareName" th:field="*{softwareName}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">描述：</label>
            <div class="col-sm-8">
                <textarea class="form-control" type="text" name="description" th:field="*{description}"></textarea>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">金额：</label>
            <div class="col-sm-8">
                <input class="form-control" type="number" name="money" th:field="*{money}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">费用类型：</label>
            <div class="col-sm-8">
                <select name="costType" id="costType" class="form-control" th:field="*{costType}">
                    <option value="">请选择</option>
                    <option value="1">费控内</option>
                    <option value="2">费控外</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">所属项目：</label>
            <div class="col-sm-8">
                <select class="form-control" name="projectCode" required>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="note" th:field="*{note}">
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script type="text/javascript">
    var prefix = ctx + "purchase/software";

    $.validator.addMethod("maxDecimalLength", function(value, element, param) {
        // 允许为空，required 会处理
        if (!value) return true;

        // 移除非数字字符（允许小数点）
        let numStr = value.toString().replace(/[^0-9.]/g, '');

        // 分割整数和小数部分
        let parts = numStr.split('.');
        let integerPart = parts[0];
        let decimalPart = parts.length > 1 ? parts[1] : '';

        // 总位数 = 整数位数 + 小数位数
        let totalDigits = integerPart.length + decimalPart.length;

        return totalDigits <= param;
    }, "数字总位数超过限制");
    $("#form-software-edit").validate({
        rules:{
            money: {
                required: true,
                number: true,
                min: 0,
                maxDecimalLength: 13 // 调用自定义规则，限制总位数为13位
            },
            note:{
                required:true
            },
        },
        messages:{
            money: {
                required: "请输入金额",
                number: "请输入有效的金额",
                min: "金额不能为负数",
                maxDecimalLength: "数字总位数不能超过13位（不含小数点）"
            },
            note:{
                required:"请输入备注"
            },
        },
        focusCleanup: true
    });

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/edit", $('#form-software-edit').serialize());
        }
    }

    let projectCode = '[[${software.projectCode}]]';
    $(function() {//调用的方法在页面加载完成后立即执行
        initProjectCode();
    });

    // 初始化项目下拉框
    function initProjectCode(){
        $.ajax({
            url: ctx + "project/statis/list",
            type: "post",
            dataType: "json",
            data: {
                "status": 2,
                "pageNum": 1,
                "pageSize": 1000
            },
            success: function(result) {
                if (result.code === web_status.SUCCESS) {
                    let selector = $("select[name='projectCode']");
                    selector.empty();
                    let options = [];
                    let data = result.rows;
                    for (let i = 0; i < data.length; i++) {
                        console.log(projectCode);
                        console.log(data[i].projectCode);
                        if($.common.equals(projectCode,data[i].projectCode))
                        {
                            options.unshift("<option selected value='" + data[i].projectCode + "'>" + data[i].projectName + "</option>");
                            continue;
                        }
                        options.push("<option value='" + data[i].projectCode + "'>" + data[i].projectName + "</option>");
                    }
                    selector.append(options.join(""));
                }

            }
        })
    }
</script>
</body>
</html>
