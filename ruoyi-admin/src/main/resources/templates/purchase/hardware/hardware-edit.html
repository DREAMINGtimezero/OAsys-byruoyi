<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改硬件')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="hardware-edit" th:object="${hardware}">
        <input name="id" type="hidden"  th:field="*{id}" />
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">硬件编号：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="hardwareCode" th:field="*{hardwareCode}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">硬件名称：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="hardwareName" th:field="*{hardwareName}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">硬件详情：</label>
            <div class="col-sm-8">
                <textarea class="form-control" type="text" name="hardwareDetails" th:field="*{hardwareDetails}"></textarea>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">金额：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="money" th:field="*{money}">
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">所属项目：</label>
            <div class="col-sm-8">
                <select class="form-control" name="projectCode">
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">费控类型：</label>
            <div class="col-sm-8">
                <select name="costType" id="costType" class="form-control" th:field="*{costType}">
                    <option value="">请选择</option>
                    <option value="1">费控内</option>
                    <option value="2">费控外</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label ">备注：</label>
            <div class="col-sm-8">
                <textarea class="form-control" type="text" name="note" id="note" ></textarea>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script type="text/javascript">
    var prefix = ctx + "purchase/hardware";

    let projectCode = '[[${hardware.projectCode}]]';
    $(function (){
        initProjectCode();
    })
    // 初始化项目下拉框
    function initProjectCode(){
        $.ajax({
            url: ctx + "project/statis/list",
            type: "post",
            dataType: "json",
            data: {
                "status": 2,
                "pageNum": 1,
                "pageSize": 1000
            },
            success: function(result) {
                if (result.code === web_status.SUCCESS) {
                    let selector = $("select[name='projectCode']");
                    let options = [];
                    let data = result.rows;
                    for (let i = 0; i < data.length; i++) {
                        console.log(projectCode);
                        console.log(data[i].projectCode);
                        if($.common.equals(projectCode,data[i].projectCode))
                        {
                            options.unshift("<option selected value='" + data[i].projectCode + "'>" + data[i].projectName + "</option>");
                            continue;
                        }
                        options.push("<option value='" + data[i].projectCode + "'>" + data[i].projectName + "</option>");
                    }
                    selector.append(options.join(""));
                }

            }
        })
    }

    $("#hardware-edit").validate({
        rules:{
            hardwareCode:{
                required:true
            },
            hardwareName:{
                required:true
            },
            hardwareDetails:{
                required:true
            },
            money:{
                required:true
            },
        },
    });

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/updateHardware", $('#hardware-edit').serialize());
        }
    }
</script>
</body>
</html>
