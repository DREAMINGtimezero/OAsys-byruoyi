<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('新增硬件')" />
    <th:block th:include="include :: bootstrap-fileinput-css" />
</head>
<body class="">
<div class="wrapper wrapper-content animated fadeInRight">
    <form class="form-horizontal m" id="hardware-add">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">硬件编号：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="hardwareCode" id="hardwareCode" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">硬件名称：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="hardwareName" id="hardwareName" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">硬件详情：</label>
            <div class="col-sm-8">
                <textarea class="form-control" type="text" name="hardwareDetails" id="hardwareDetails" required></textarea>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">金额：</label>
            <div class="col-sm-8">
                <input class="form-control" type="number" name="money" id="money" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">所属项目：</label>
            <div class="col-sm-8">
                <select class="form-control" name="projectCode">
                    <option value="">请选择</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">费控类型：</label>
            <div class="col-sm-8">
                <select class="form-control" name="costType" id="handleResult" required>
                    <option value="1">费控内</option>
                    <option value="2">费控外</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label ">备注：</label>
            <div class="col-sm-8">
                <textarea class="form-control" type="text" name="note" id="note" ></textarea>
            </div>
        </div>
    </form>
</div>



<th:block th:include="include :: footer" />
<th:block th:include="include :: bootstrap-fileinput-js" />
<script type="text/javascript">
    var prefix = ctx + "purchase/hardware";

    $(function (){
        initProjectCode();
    })
    // 初始化项目下拉框
    function initProjectCode(){
        $.ajax({
            url: ctx + "project/statis/list",
            type: "post",
            dataType: "json",
            data: {
                "status": 2,
                "pageNum": 1,
                "pageSize": 1000
            },
            success: function(result) {
                debugger;
                if (result.code == web_status.SUCCESS) {
                    var data = result.rows;
                    for (var i = 0; i < data.length; i++) {
                        $("select[name='projectCode']").append(
                            "<option value='" + data[i].projectCode + "'>" + data[i].projectName + "</option>");}
                }
            }
        })
    }

    $("#hardware-add").validate({
        onkeyup: false,
        rules:{
            userPhone:{
                isPhone:true
            },
            userEmail:{
                email:true
            },
        },
        focusCleanup: true
    });

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/insertHardware", $('#hardware-add').serialize());
        }
    }
</script>
</body>
</html>
