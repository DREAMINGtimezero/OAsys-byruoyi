<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('新增服务')" />
    <style>
        input[name="money"]+.error {
            right:64px !important;
        }
    </style>
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal" id="form-service-add">
        <div class="col-xs-12">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">所属项目：</label>
            <div class="col-sm-8">
                <select class="form-control" name="projectCode" required>
                    <option value="">请选择</option>
                </select>
            </div>
        </div>
        </div>
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">服务编号：</label>
                <div class="col-sm-8">
                    <input name="serviceCode" class="form-control" type="text" required>
                </div>
            </div>
        </div>
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">服务名称：</label>
                <div class="col-sm-8">
                    <input name="title" class="form-control" type="text" required>
                </div>
            </div>
        </div>
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">描述信息：</label>
                <div class="col-sm-8">
                    <textarea name="description" class="form-control" required></textarea>
                </div>
            </div>
        </div>
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label">备注信息：</label>
                <div class="col-sm-8">
                    <input name="note" class="form-control" type="text">
                </div>
            </div>
        </div>
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">服务开销金额：</label>
                <div class="col-sm-8">
                    <input name="money" class="form-control" type="number" min="0" required>
                </div>
            </div>
        </div>

        <div class="col-xs-12">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">费用类型：</label>
            <div class="col-sm-8">
                <select name="costType" id="costType" class="form-control" required>
                    <option value="">请选择</option>
                    <option value="1">费控内</option>
                    <option value="2">费控外</option>
                </select>
            </div>
        </div>
        <div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    const prefix = ctx + "purchase/service"
    $("#form-service-add").validate({
        focusCleanup: true,
        rules:{
            projectCode: {
                required: true
            },
            money: {
                required: true,
                number: true,
                min: 0,
                maxLength: 13, // 调用自定义规则，限制总位数为13位
                maxDecimalLength: 2 // 调用自定义规则，限制小数点后的位数最大为2位
            },
        },
        messages: {
            projectCode: {
                required: "请选择所属项目"
            },
            money: {
                required: "请输入金额",
                number: "请输入有效的金额",
                min: "金额不能为负数",
                maxLength: "数字总位数不能超过13位（不含小数点）",
                maxDecimalLength: "小数点后的数字超过2位"
            },
        },
        focusInvalid: false,
        onfocusout: function(element) {
            $(element).valid();
        },
        onkeyup: function(element) {
            $(element).valid();
        },
        showErrors: function(errorMap, errorList) {
            // 只显示第一个错误信息
            if (errorList.length > 0) {
                let firstError = errorList[0];
                this.errorList = [firstError];
                this.errorMap = {};
                this.errorMap[firstError.element.name] = firstError.message;
            }
            this.defaultShowErrors();
        }
    });

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/add", $('#form-service-add').serialize());
        }
    }
    $(function() {
        initProjectCode();
    });

    // 初始化项目下拉框
    function initProjectCode(){
        $.ajax({
            url: ctx + "project/statis/list",
            type: "post",
            dataType: "json",
            data: {
                "status": 2,
                "pageNum": 1,
                "pageSize": 1000
            },
            success: function(result) {
                if (result.code === web_status.SUCCESS) {
                    var data = result.rows;
                    for (var i = 0; i < data.length; i++) {
                        $("select[name='projectCode']").append(
                            "<option value='" + data[i].projectCode + "'>" +  data[i].projectName + "</option>");}
                }
            }
        })
    }
</script>
</body>
</html>
