<div th:fragment="handlerInput">
    <div class="col-xs-12">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">处理人部门：</label>
            <div class="col-sm-8">
                <input class="form-control" name="deptText" type="text"  readonly>
            </div>
        </div>
    </div>

    <div class="col-xs-12">
        <div class="form-group">
            <label class="col-sm-3 control-label"></label>
            <div class="col-sm-8">
                <div class="ui-layout-content">
                    <div id="tree" class="ztree"></div>
                </div>
            </div>
        </div>
    </div>


    <div class="col-xs-12">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">处理人岗位：</label>
            <div class="col-sm-8">
                <select class="form-control" name="handlePost" onchange="initHandleBy()" required>
                    <option value="">请选择</option>
                </select>
            </div>
        </div>
    </div>

    <div class="col-xs-12">
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">指定处理人：</label>
            <div class="col-sm-8">
                <select class="form-control" name="handleBy" onclick="validateHandleBy()" required>
                    <option value="">请先选择岗位和部门</option>
                </select>
            </div>
        </div>
    </div>
</div>
