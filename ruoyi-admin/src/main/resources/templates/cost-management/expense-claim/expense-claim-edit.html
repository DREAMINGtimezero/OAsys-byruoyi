<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改报销单主表')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-claim-edit" th:object="${expenseClaim}">
        <input name="id" th:field="*{id}" type="hidden">

        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required" >报销明细：</label>
                <div class="col-sm-8">
                    <input name="costType" th:field="*{costType}" placeholder="出差、交通、住宿、餐饮等" class="form-control" type="text" required>
                </div>
            </div>
        </div>

        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">费用金额：</label>
                <div class="col-sm-8">
                    <input name="cost" th:field="*{cost}" class="form-control" type="number" required>
                </div>
            </div>
        </div>

        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label">详情：</label>
                <div class="col-sm-8">
                    <textarea th:field="*{description}" name="description" class="form-control"></textarea>
                </div>
            </div>
        </div>

    </form>
</div>
<th:block th:include="include :: footer" />
<script th:inline="javascript">
    var prefix = ctx + "cost-management/expense-claim";
    $("#form-claim-edit").validate({
        focusCleanup: true,
        rules:{
            projectCode: {
                required: true
            },
            cost: {
                required: true,
                number: true,
                min: 0,
                maxLength: 13, // 调用自定义规则，限制总位数为13位
                maxDecimalLength: 2 // 调用自定义规则，限制小数点后的位数最大为2位
            },
        },
        messages: {
            projectCode: {
                required: "请选择所属项目"
            },
            cost: {
                required: "请输入金额",
                number: "请输入有效的金额",
                min: "金额不能为负数",
                maxLength: "数字总位数不能超过13位（不含小数点）",
                maxDecimalLength: "小数点后的数字超过2位"
            },
        },
        focusInvalid: false,
        onfocusout: function(element) {
            $(element).valid();
        },
        onkeyup: function(element) {
            $(element).valid();
        },
        showErrors: function(errorMap, errorList) {
            // 只显示第一个错误信息
            if (errorList.length > 0) {
                let firstError = errorList[0];
                this.errorList = [firstError];
                this.errorMap = {};
                this.errorMap[firstError.element.name] = firstError.message;
            }
            this.defaultShowErrors();
        }
    });

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/edit", $('#form-claim-edit').serialize());
        }
    }
</script>
</body>
</html>
