<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" xmlns="http://www.w3.org/1999/html">
<head>
    <th:block th:include="include :: header('修改服务合同')" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-service-contract-edit" th:object="${servicecontract}">
        <input name="id" type="hidden" th:field="*{id}" />
        <div class="form-group">
            <label class="col-sm-3 control-label ">合同编号：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="serviceContractId" th:field="*{serviceContractId}" >
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">合同名称：</label>
            <div class="col-sm-8">
                <input class="form-control" type="text" name="serviceContractName" th:field="*{serviceContractName}" required>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label ">金额：</label>
            <div class="col-sm-8">
                <input class="form-control" type="number" name="serviceAmount" th:field="*{serviceAmount}" >
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label is-required">合同描述：</label>
            <div class="col-sm-8">
                <textarea class="form-control" name="description" th:field="*{description}"></textarea>
            </div>
        </div>
        <div class="form-group">
            <label class="col-sm-3 control-label">备注：</label>
            <div class="col-sm-8">
                <textarea class="form-control" name="note" th:field="*{note}"></textarea>
            </div>
        </div>
    </form>
</div>
<th:block th:include="include :: footer" />
<script type="text/javascript">
    var prefix = ctx + "cost-management/servicecontract";

    $("#form-service-contract-edit").validate({
        rules:{
            serviceContractName:{
                required:true
            },
            description:{
                required:true
            },
        },
        focusCleanup: true
    });

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/edit", $('#form-service-contract-edit').serialize());
        }
    }

</script>
</body>
</html>
