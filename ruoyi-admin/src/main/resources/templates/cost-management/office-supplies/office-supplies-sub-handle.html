<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('处理')" />
    <th:block th:include="include :: bootstrap-fileinput-css"/>
    <th:block th:include="include :: datetimepicker-css" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal" id="form-sub-edit" th:object="${officeSuppliesSub}">
        <input name="id" th:field="*{id}" type="hidden">
        <input name="officeSuppliesId" th:field="*{officeSuppliesId}" type="hidden">
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label">发起人职位：</label>
                <div class="col-sm-8">
                    <input type="text" class="form-control" name="createPost" th:field="*{createPost}" readonly>
                </div>
            </div>
        </div>

        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label">发起人所属部门：</label>
                <div class="col-sm-8">
                    <input type="text" class="form-control" name="createDept" th:field="*{createDept}" readonly>
                </div>
            </div>
        </div>
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label">流程发起人备注：</label>
                <div class="col-sm-8">
                    <textarea name="initiateNote" class="form-control" readonly>[[*{initiateNote}]]</textarea>
                </div>
            </div>
        </div>

        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required" >处理人：</label>
                <div class="col-sm-8">
                    <input type="text" class="form-control" name="handleBy" th:field="*{handleBy}" readonly>
                </div>
            </div>
        </div>

        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required" >处理意见：</label>
                <div class="col-sm-8">
                    <textarea name="handleNote" class="form-control" required>[[*{handleNote}]]</textarea>
                </div>
            </div>
        </div>

        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required" >处理方式：</label>
                <div class="col-sm-8">
                    <select name="status" class="form-control" type="number" required>
                        <option value="3">通过</option>
                        <option value="4">驳回</option>
                    </select>
                </div>
            </div>
        </div>

        <!--  upload files-->
        <input type="hidden" name="fileNames">
        <div class="row">
            <div class="col-sm-12">
                <div class="ibox float-e-margins">
                    <div class="ibox-content">
                        <div class="form-group">
                            <label class="font-noraml">文件上传</label>
                            <div class="file-loading">
                                <input id="multipleFile" name="files" type="file" multiple>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </form>
</div>
<th:block th:include="include :: footer" />
<th:block th:include="include :: bootstrap-fileinput-js"/>
<th:block th:include="include :: datetimepicker-js" />
<script th:src="@{/js/jquery.tmpl.js}"></script>
<script th:inline="javascript">
    const prefix = ctx + "cost-management/office-supplies";
    $("#form-sub-edit").validate({
        focusCleanup: true
    });

    $(document).ready(function () {
        // 多图上传
        $("#multipleFile").fileinput({
            uploadUrl: ctx + 'common/uploads',
            uploadAsync: false
        }).on('filebatchuploadsuccess', function (event, data, previewId, index) {
            var rsp = data.response;
            $("input[name='fileNames']").val(rsp.fileNames.replaceAll("/profile/upload",""));
        }).on('fileremoved', function (event, id, index) {
            $("input[name='" + event.currentTarget.id + "']").val('')
        })
    });
    function submitHandler() {
        if ($.validate.form()) {
            let uri = "/sub-pass";
            let status =  $('select[name="status"]').val();
            if(String(status)==='4')
            {
                uri = "/sub-reject"
            }
            $.operate.save(prefix + uri, $('#form-sub-edit').serialize(),submitCallback);
        }
    }
    function submitCallback(result) {
        if (result.code === web_status.SUCCESS){
            top.$("iframe").each(function() {
                if (this.src.indexOf("detail") > -1) {
                    this.contentWindow.initDetailTable();
                    return false;
                }
            });
        }
    }

</script>
</body>
</html>
